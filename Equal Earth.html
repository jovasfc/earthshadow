<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3.js Equal Earth Projection</title>
    <!-- 使用 unpkg 获取特定版本的 D3 -->
    <script src="https://unpkg.com/d3@7.8.5/dist/d3.min.js"></script>
    <script src="https://unpkg.com/topojson@3.0.2/dist/topojson.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            background-color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .map-container {
            width: 100%;
            max-width: 900px;
            margin-top: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            padding: 20px;
            position: relative;
        }
        .sphere {
            fill: #f0fdf4;
            stroke: #16a34a;
            stroke-width: 0.5px;
        }
        .graticule {
            fill: none;
            stroke: #cbd5e1;
            stroke-width: 0.5px;
            stroke-dasharray: 2,2;
        }
        .land {
            fill: #064e3b;
            transition: fill 0.3s;
            cursor: pointer;
        }
        .land:hover {
            fill: #16a34a;
        }
        #info-panel {
            font-family: monospace;
            font-size: 10px;
            color: #94a3b8;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="text-center mt-10 px-4">
        <h1 class="text-3xl font-bold text-slate-800">Equal Earth 投影</h1>
        <p class="text-slate-500 mt-2">一种伪圆柱等积投影，常用于展示全球数据</p>
    </div>

    <div class="map-container">
        <div id="map"></div>
        <div id="info-panel"></div>
        <div class="mt-4 flex justify-between items-center text-sm text-slate-400 border-t pt-4">
            <span>数据源: World Atlas (110m)</span>
            <span id="proj-status">正在渲染地图...</span>
        </div>
    </div>

    <script>
        window.onload = function() {
            const statusElement = document.getElementById('proj-status');
            const infoElement = document.getElementById('info-panel');
            
            // --- 核心绘图逻辑 ---
            const width = 860;
            const height = 450; // Equal Earth 宽高比通常较为扁平

            // 使用 D3 内置的 geoEqualEarth
            const projection = d3.geoEqualEarth()
                .scale(160)
                .translate([width / 2, height / 2])
                .precision(0.1);

            const path = d3.geoPath().projection(projection);
            const graticule = d3.geoGraticule();

            const svg = d3.select("#map")
                .append("svg")
                .attr("viewBox", `0 0 ${width} ${height}`)
                .attr("width", "100%")
                .attr("height", "auto");

            // 绘制海洋背景
            svg.append("path")
                .datum({type: "Sphere"})
                .attr("class", "sphere")
                .attr("d", path);

            // 绘制网格线
            svg.append("path")
                .datum(graticule())
                .attr("class", "graticule")
                .attr("d", path);

            // 加载地图数据
            async function loadMap() {
                try {
                    const response = await fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json");
                    const world = await response.json();
                    
                    const countries = topojson.feature(world, world.objects.countries).features;

                    // 绘制陆地
                    svg.append("g")
                        .selectAll("path")
                        .data(countries)
                        .enter()
                        .append("path")
                        .attr("class", "land")
                        .attr("d", path)
                        .on("mouseover", function(event, d) {
                            statusElement.innerText = "当前国家: " + (d.properties.name || "未知");
                        })
                        .on("mouseout", function() {
                            statusElement.innerText = "投影类型: Equal Earth";
                        })
                        .append("title")
                        .text(d => d.properties.name);

                    // 绘制边界线
                    svg.append("path")
                        .datum(topojson.mesh(world, world.objects.countries, (a, b) => a !== b))
                        .attr("fill", "none")
                        .attr("stroke", "#ffffff")
                        .attr("stroke-width", 0.5)
                        .attr("d", path);

                    statusElement.innerText = "投影类型: Equal Earth";
                    infoElement.innerText = "Equal Earth 投影由 Bojan Šavrič, Tom Patterson 和 Bernhard Jenny 于 2018 年共同开发。";
                } catch (err) {
                    statusElement.innerText = "加载失败: " + err.message;
                }
            }

            loadMap();
        };
    </script>
</body>
</html>
