        ];
        
        const lunarMonths = ['正','二','三','四','五','六','七','八','九','十','冬','腊'];
        const lunarDays = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
                          '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
                          '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
        
        // 计算农历日期
        function getLunarDate(date) {
            const baseDate = new Date(1900, 0, 31); // 1900年正月初一
            const targetDate = new Date(date);
            targetDate.setHours(0, 0, 0, 0);
            
            let offset = Math.floor((targetDate - baseDate) / 86400000);
            let year = 1900;
            let daysInYear = 0;
            
            // 计算年份
            for (year = 1900; year < 2100 && offset > 0; year++) {
                daysInYear = getLunarYearDays(year);
                offset -= daysInYear;
            }
            
            if (offset < 0) {
                offset += daysInYear;
                year--;
            }
            
            const leapMonth = getLeapMonth(year);
            let month = 1;
            let isLeap = false;
            let daysInMonth = 0;
            
            // 计算月份
            for (month = 1; month < 13 && offset > 0; month++) {
                // 检查是否是闰月
                if (leapMonth > 0 && month === leapMonth + 1 && !isLeap) {
                    month--;
                    isLeap = true;
                    daysInMonth = getLeapDays(year);
                } else {
                    daysInMonth = getMonthDays(year, month);
                }
                
                offset -= daysInMonth;
                
                if (isLeap && month === leapMonth + 1) {
                    isLeap = false;
                }
            }
            
            if (offset < 0) {
                offset += daysInMonth;
                month--;
            }
            
            const day = offset + 1;
            
            return {
                year: year,
                month: month,
                day: day,
                isLeap: isLeap,
                monthStr: (isLeap ? '闰' : '') + lunarMonths[month - 1] + '月',
                dayStr: lunarDays[day - 1]
            };
        }
        
        function getLunarYearDays(year) {
            let sum = 348;
            for (let i = 0x8000; i > 0x8; i >>= 1) {
                sum += (lunarData[year - 1900] & i) ? 1 : 0;
            }
            return sum + getLeapDays(year);
        }
        
        function getLeapMonth(year) {
            return lunarData[year - 1900] & 0xf;
        }
        
        function getLeapDays(year) {
            if (getLeapMonth(year)) {
                return (lunarData[year - 1900] & 0x10000) ? 30 : 29;
            }
            return 0;
        }
        
        function getMonthDays(year, month) {
            return (lunarData[year - 1900] & (0x10000 >> month)) ? 30 : 29;
        }

        // 计算均时差（Equation of Time）
        // 返回值：分钟（正数表示真太阳时比平太阳时慢，即太阳表慢）
        // 参考：https://en.wikipedia.org/wiki/Equation_of_time
        function getEquationOfTime(date) {
            const d = new Date(date);
            // 计算从J2000.0开始的天数
            const J2000 = new Date(Date.UTC(2000, 0, 1, 12, 0, 0));
            const n = (d.getTime() - J2000.getTime()) / 86400000;
            
            // 平黄经（度）
            const L = (280.466 + 0.9856474 * n) % 360;
            // 平近点角（度）
            const g = (357.528 + 0.9856003 * n) % 360;
            
            // 转换为弧度
            const Lrad = L * Math.PI / 180;
            const grad = g * Math.PI / 180;
            
            // 黄道倾角（度）
            const epsilon = 23.439 - 0.0000004 * n;
            const epsilonRad = epsilon * Math.PI / 180;
            
            // 计算太阳黄经（视黄经）
            // 太阳黄经 = 平黄经 + 中心差
            const centerEquation = (1.915 * Math.sin(grad) + 0.020 * Math.sin(2 * grad)) * Math.PI / 180;
            const lambda = Lrad + centerEquation;
            
            // 计算太阳的赤经（right ascension）
            // tan(赤经) = tan(黄经) * cos(黄赤交角)
            const alpha = Math.atan2(Math.sin(lambda) * Math.cos(epsilonRad), Math.cos(lambda));
            
            // 计算太阳的平赤经（mean right ascension）
            // 平赤经 = 平黄经（转换为0-2π范围）
            let L0 = Lrad;
            while (L0 < 0) L0 += 2 * Math.PI;
            while (L0 >= 2 * Math.PI) L0 -= 2 * Math.PI;
            
            // 均时差 = 平赤经 - 真赤经（转换为角度）
            let E = L0 - alpha;
            
            // 归一化到 -π 到 π 范围
            while (E > Math.PI) E -= 2 * Math.PI;
            while (E < -Math.PI) E += 2 * Math.PI;
            
            // 转换为分钟（1弧度 = 13750.9871分钟，但更简单的是：360度=24小时=1440分钟）
            // 所以 1弧度 = 1440 / (2π) 分钟 ≈ 229.18 分钟
            const Eminutes = E * 180 / Math.PI * 4;
            
            return Eminutes;
        }
        
        // 将平太阳时转换为真太阳时
        // 输入：UTC时间，经度
        // 输出：真太阳时（小时，0-24）
        function getTrueSolarTime(utcDate, lon) {
            // 地方平太阳时 = UTC + 经度/15
            const lonOffsetHours = lon / 15;
            let localMeanTime = (utcDate.getUTCHours() + utcDate.getUTCMinutes()/60 + utcDate.getUTCSeconds()/3600 + lonOffsetHours) % 24;
            if (localMeanTime < 0) localMeanTime += 24;
            
            // 均时差（分钟）
            // 均时差 = 平太阳时 - 真太阳时（单位：分钟）
            // 当均时差为正时，真太阳时比平太阳时慢
            const eot = getEquationOfTime(utcDate);
            
            // 真太阳时 = 地方平太阳时 - 均时差/60
            let trueSolarTime = localMeanTime - eot / 60;
            if (trueSolarTime < 0) trueSolarTime += 24;
            if (trueSolarTime >= 24) trueSolarTime -= 24;
            
            return trueSolarTime;
        }

        // 时间体系转换函数
        // 输入: 用户输入的日期时间, 时间体系, 经度
        // 输出: 对应的UTC时间
        function convertToUTC(date, timeSystem, lon) {
            const d = new Date(date);
            switch(timeSystem) {
                case 'utc':
                    // UTC时间直接返回
                    return d;
                case 'local':
                    // 地方时 = UTC + 经度/15小时
                    // 所以 UTC = 地方时 - 经度/15小时
                    const lonOffset = lon / 15; // 小时
                    return new Date(d.getTime() - lonOffset * 3600000);
                case 'standard':
                default:
                    // 标准时（用户输入时间视为本地标准时）
                    // 需要获取时区偏移
                    const localOffset = d.getTimezoneOffset(); // 分钟
                    return new Date(d.getTime() + localOffset * 60000);
            }
        }

        // 将UTC时间转换为指定时间体系用于显示
        function formatTimeForDisplay(utcDate, timeSystem, lon) {
            switch(timeSystem) {
                case 'utc':
                    return utcDate.getUTCHours();
                case 'local':
                    // 地方时 = UTC + 经度/15小时
                    const lonOffset = lon / 15;
                    let localHour = (utcDate.getUTCHours() + utcDate.getUTCMinutes()/60 + lonOffset) % 24;
                    if (localHour < 0) localHour += 24;
                    return Math.floor(localHour);
                case 'standard':
                default:
                    // 标准时
                    const d = new Date(utcDate.getTime());
                    return d.getHours();
            }
        }

        function updateAstronomicalData() {
            const lat = parseFloat(document.getElementById('input-lat').value);
            const lon = parseFloat(document.getElementById('input-lon').value);
            const timeSystem = document.getElementById('time-system').value;
            if(isNaN(lat) || isNaN(lon)) return;
            
            // 使用内部存储的UTC时间
            const currDate = new Date(internalUTCDate);
            
            // 更新真太阳时显示
            const trueSolarTime = getTrueSolarTime(currDate, lon);
            const trueHours = Math.floor(trueSolarTime);
            const trueMinutes = Math.floor((trueSolarTime - trueHours) * 60);
            const trueSeconds = Math.floor(((trueSolarTime - trueHours) * 60 - trueMinutes) * 60);
            document.getElementById('true-solar-time-value').textContent = 
                `${String(trueHours).padStart(2, '0')}:${String(trueMinutes).padStart(2, '0')}:${String(trueSeconds).padStart(2, '0')}`;
            
            // 更新农历显示
            const lunar = getLunarDate(currDate);
            document.getElementById('lunar-date').textContent = `${lunar.monthStr}${lunar.dayStr}`;
            
            // 更新均时差显示
            const eot = getEquationOfTime(currDate);
            const eotSign = eot >= 0 ? '+' : '';
            document.getElementById('eot-value').textContent = `${eotSign}${eot.toFixed(1)}`;
            
            // 更新天球赤道系统倾角
            // 默认天极(Y轴)在天顶。绕X轴旋转，使天极指向正北(+Z方向)，高度角等于纬度。
            groups.baseEqRotate.rotation.x = Math.PI / 2 - (lat * Math.PI / 180);

            // 清理旧轨迹和标记
            clearGroup(groups.sunTraj);
            clearGroup(groups.sunHour);
            clearGroup(groups.moonTraj);
            clearGroup(groups.moonHour);
            clearGroup(groups.gnomon);

            // 获取线宽设置
            const sunLineWidth = parseFloat(document.getElementById('line-width-sun').value) || 2;
            const moonLineWidth = parseFloat(document.getElementById('line-width-moon').value) || 2;
            const gridLineWidth = parseFloat(document.getElementById('line-width-grid').value) || 1;
            
            // 重新创建坐标系以应用线宽
            createHorizonSystem(gridLineWidth);
            createEquatorialSystem(gridLineWidth);
            
            const sunPoints = [];
            const moonPoints = [];

            // 1. 生成高密度轨迹线 (每10分钟一个点)
            // 轨迹覆盖完整的24小时（从当天0点到24点）
            // 使用与逐小时标记相同的dayStartUTC
            let dayStartUTC;
            if (timeSystem === 'utc') {
                dayStartUTC = Date.UTC(
                    currDate.getUTCFullYear(),
                    currDate.getUTCMonth(),
                    currDate.getUTCDate()
                );
            } else if (timeSystem === 'local') {
                // 地方时0点对应的UTC时间
                const lonOffsetMs = (lon / 15) * 3600000;
                dayStartUTC = Date.UTC(
                    currDate.getUTCFullYear(),
                    currDate.getUTCMonth(),
                    currDate.getUTCDate(),
                    0, 0, 0, 0
                ) - lonOffsetMs;
            } else {
                // 标准时：使用浏览器时区
                const tempDate = new Date(currDate);
                tempDate.setHours(0, 0, 0, 0);
                dayStartUTC = tempDate.getTime();
            }
            
            for (let m = 0; m <= 24 * 60; m += 10) {
                const t = new Date(dayStartUTC + m * 60000);
                
                const sPos = SunCalc.getPosition(t, lat, lon);
                sunPoints.push(toVector(sPos.azimuth, sPos.altitude, R));
                
                const mPos = SunCalc.getMoonPosition(t, lat, lon);
                moonPoints.push(toVector(mPos.azimuth, mPos.altitude, R));
            }

            // 创建太阳轨迹线 - 使用TubeGeometry支持可变线宽
            if (sunLineWidth <= 1) {
                const sunLineMat = new THREE.LineBasicMaterial({ color: 0xff8c00 });
                groups.sunTraj.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(sunPoints), sunLineMat));
            } else {
                const sunCurve = new THREE.CatmullRomCurve3(sunPoints);
                const sunTubeGeo = new THREE.TubeGeometry(sunCurve, sunPoints.length - 1, sunLineWidth * 0.3, 8, false);
                groups.sunTraj.add(new THREE.Mesh(sunTubeGeo, new THREE.MeshBasicMaterial({ color: 0xff8c00 })));
            }

            // 创建月球轨迹线 - 使用TubeGeometry支持可变线宽
            if (moonLineWidth <= 1) {
                const moonLineMat = new THREE.LineBasicMaterial({ color: 0x00bfff });
                groups.moonTraj.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(moonPoints), moonLineMat));
            } else {
                const moonCurve = new THREE.CatmullRomCurve3(moonPoints);
                const moonTubeGeo = new THREE.TubeGeometry(moonCurve, moonPoints.length - 1, moonLineWidth * 0.3, 8, false);
                groups.moonTraj.add(new THREE.Mesh(moonTubeGeo, new THREE.MeshBasicMaterial({ color: 0x00bfff })));
            }

            // 2. 生成当前时刻的真实位置大球（精确到分钟）
            const currSPos = SunCalc.getPosition(currDate, lat, lon);
            const sunMesh = new THREE.Mesh(new THREE.SphereGeometry(3, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffd700 }));
            sunMesh.position.copy(toVector(currSPos.azimuth, currSPos.altitude, R));
            groups.sunTraj.add(sunMesh);

            const currMPos = SunCalc.getMoonPosition(currDate, lat, lon);
            const moonMesh = new THREE.Mesh(new THREE.SphereGeometry(2.5, 16, 16), new THREE.MeshBasicMaterial({ color: 0xdddddd }));
            moonMesh.position.copy(toVector(currMPos.azimuth, currMPos.altitude, R));
            groups.moonTraj.add(moonMesh);

            // 更新面板上的天体位置显示
            // 太阳方位角和高度角
            const sunAzimuthDeg = ((currSPos.azimuth * 180 / Math.PI) + 180) % 360; // 转换为0-360度，北为0
            const sunAltitudeDeg = currSPos.altitude * 180 / Math.PI;
            document.getElementById('sun-azimuth').textContent = sunAzimuthDeg.toFixed(1) + '°';
            document.getElementById('sun-altitude').textContent = sunAltitudeDeg.toFixed(1) + '°';
            
            // 月球方位角和高度角
            const moonAzimuthDeg = ((currMPos.azimuth * 180 / Math.PI) + 180) % 360;
            const moonAltitudeDeg = currMPos.altitude * 180 / Math.PI;
            document.getElementById('moon-azimuth').textContent = moonAzimuthDeg.toFixed(1) + '°';
            document.getElementById('moon-altitude').textContent = moonAltitudeDeg.toFixed(1) + '°';
            
            // 计算影长
            const gnomonHeight = 15;
            let shadowLength = 0;
            if (sunAltitudeDeg > 0) {
                shadowLength = gnomonHeight / Math.tan(currSPos.altitude);
            }
            document.getElementById('shadow-length').textContent = shadowLength > 0 ? shadowLength.toFixed(1) : '无影';

            // 2.5 创建日晷（立竿见影）
            // 指针高度设为15，太阳位置使用当前太阳位置向量
            const sunDir = toVector(currSPos.azimuth, currSPos.altitude, 1); // 单位向量
            const gnomon = createGnomon(gnomonHeight, sunDir, gridLineWidth);
            groups.gnomon.add(gnomon);

            // 3. 生成逐小时标记点和文本（整点时间）
            // 使用前面计算的dayStartUTC
            
            // 生成24个整点标记
            for (let h = 0; h < 24; h++) {
                const t = new Date(dayStartUTC + h * 3600000);
                
                // 根据时间体系计算显示的小时数
                const displayHour = h;
                
                // 太阳小时
                const sP = SunCalc.getPosition(t, lat, lon);
                const sVec = toVector(sP.azimuth, sP.altitude, R);
                const sDot = new THREE.Mesh(new THREE.SphereGeometry(1, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff8c00 }));
                sDot.position.copy(sVec);
                groups.sunHour.add(sDot);
                
                const sLbl = createSpriteText(`${displayHour}:00`, '#ff8c00', 8);
                sLbl.position.copy(sVec).multiplyScalar(1.08);
                groups.sunHour.add(sLbl);

                // 月球小时
                const mP = SunCalc.getMoonPosition(t, lat, lon);
                const mVec = toVector(mP.azimuth, mP.altitude, R);
                const mDot = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), new THREE.MeshBasicMaterial({ color: 0x00bfff }));
                mDot.position.copy(mVec);
                groups.moonHour.add(mDot);

                const mLbl = createSpriteText(`${displayHour}:00`, '#00bfff', 8);
                mLbl.position.copy(mVec).multiplyScalar(1.08);
                groups.moonHour.add(mLbl);
            }
            
        }

        // 绘图功能相关变量
        let drawMode = 'none'; // 'none', 'pen', 'line', 'rect', 'ellipse', 'arrow', 'erase'
        let isDrawing = false;
        let currentLine = null;
        let drawnObjects = []; // 存储所有绘制的对象
        let drawHistory = []; // 用于撤销的历史记录
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let drawStartPoint = null;
        let drawPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0); // 默认在地平面上绘制
        let drawGroup = null; // 将在init中初始化
        
        // 获取当前绘图颜色和线宽
        function getDrawColor() {
            return document.getElementById('toolbar-color').value;
        }
        
        function getDrawWidth() {
            return parseFloat(document.getElementById('toolbar-width').value) || 2;
        }
        
        // 获取鼠标在3D空间中的位置
        function getMousePosition(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            
            // 与绘制平面相交
            const target = new THREE.Vector3();
            raycaster.ray.intersectPlane(drawPlane, target);
            
            return target;
        }
        
        // 设置绘制平面（根据当前视角）
        function updateDrawPlane() {
            // 获取相机朝向
            const cameraDirection = new THREE.Vector3();
            camera.getWorldDirection(cameraDirection);
            
            // 绘制平面垂直于相机方向
            drawPlane.normal.copy(cameraDirection).negate();
            drawPlane.constant = -drawPlane.normal.dot(controls.target);
        }
        
        // 创建矩形线条
        function createRectLine(p1, p2, color, width) {
            const minX = Math.min(p1.x, p2.x);
            const maxX = Math.max(p1.x, p2.x);
            const minY = Math.min(p1.y, p2.y);
            const maxY = Math.max(p1.y, p2.y);
            const z = p1.z;
            
            const points = [
                new THREE.Vector3(minX, minY, z),
                new THREE.Vector3(maxX, minY, z),
                new THREE.Vector3(maxX, maxY, z),
                new THREE.Vector3(minX, maxY, z),
                new THREE.Vector3(minX, minY, z)
            ];
            
            return createLine(points, color, 1.0, width);
        }
        
        // 创建椭圆线条
        function createEllipseLine(center, rx, ry, color, width) {
            const points = [];
            const segments = 64;
            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                points.push(new THREE.Vector3(
                    center.x + Math.cos(angle) * rx,
                    center.y + Math.sin(angle) * ry,
                    center.z
                ));
            }
            return createLine(points, color, 1.0, width);
        }
        
        // 创建箭头
        function createArrowLine(start, end, color, width) {
            const group = new THREE.Group();
            
            // 主线
            const mainLine = createLine([start, end], color, 1.0, width);
            group.add(mainLine);
            
            // 箭头头部
            const direction = new THREE.Vector3().subVectors(end, start).normalize();
            const arrowLength = 8;
            const arrowAngle = Math.PI / 6; // 30度
            
            // 垂直于方向的向量
            const up = new THREE.Vector3(0, 0, 1);
            let perpendicular = new THREE.Vector3().crossVectors(direction, up).normalize();
            if (perpendicular.length() < 0.001) {
                perpendicular = new THREE.Vector3(1, 0, 0);
            }
            
            // 箭头两翼
            const wing1 = new THREE.Vector3().copy(direction).applyAxisAngle(perpendicular, arrowAngle).multiplyScalar(-arrowLength).add(end);
            const wing2 = new THREE.Vector3().copy(direction).applyAxisAngle(perpendicular, -arrowAngle).multiplyScalar(-arrowLength).add(end);
            
            const arrowHead1 = createLine([end, wing1], color, 1.0, width);
            const arrowHead2 = createLine([end, wing2], color, 1.0, width);
            group.add(arrowHead1);
            group.add(arrowHead2);
            
            return group;
        }
        
        // 创建3D立方体线框
        function createCubeWireframe(center, size, color, width) {
            const half = size / 2;
            const group = new THREE.Group();
            
            // 立方体的8个顶点
            const vertices = [
                new THREE.Vector3(center.x - half, center.y - half, center.z - half),
                new THREE.Vector3(center.x + half, center.y - half, center.z - half),
                new THREE.Vector3(center.x + half, center.y + half, center.z - half),
                new THREE.Vector3(center.x - half, center.y + half, center.z - half),
                new THREE.Vector3(center.x - half, center.y - half, center.z + half),
                new THREE.Vector3(center.x + half, center.y - half, center.z + half),
                new THREE.Vector3(center.x + half, center.y + half, center.z + half),
                new THREE.Vector3(center.x - half, center.y + half, center.z + half)
            ];
            
            // 12条边
            const edges = [
                [0, 1], [1, 2], [2, 3], [3, 0], // 底面
                [4, 5], [5, 6], [6, 7], [7, 4], // 顶面
                [0, 4], [1, 5], [2, 6], [3, 7]  // 侧面
            ];
            
            for (let edge of edges) {
                const line = createLine([vertices[edge[0]], vertices[edge[1]]], color, 1.0, width);
                group.add(line);
            }
            
            return group;
        }
        
        // 创建3D球体线框
        function createSphereWireframe(center, radius, color, width) {
            const group = new THREE.Group();
            const segments = 32;
            
            // 三个正交圆环
            for (let i = 0; i < 3; i++) {
                const points = [];
                for (let j = 0; j <= segments; j++) {
                    const angle = (j / segments) * Math.PI * 2;
                    let x, y, z;
                    if (i === 0) {
                        x = center.x + Math.cos(angle) * radius;
                        y = center.y + Math.sin(angle) * radius;
                        z = center.z;
                    } else if (i === 1) {
                        x = center.x + Math.cos(angle) * radius;
                        y = center.y;
                        z = center.z + Math.sin(angle) * radius;
                    } else {
                        x = center.x;
                        y = center.y + Math.cos(angle) * radius;
                        z = center.z + Math.sin(angle) * radius;
                    }
                    points.push(new THREE.Vector3(x, y, z));
                }
                group.add(createLine(points, color, 1.0, width));
            }
            
            return group;
        }
        
        // 创建3D圆柱体线框
        function createCylinderWireframe(center, radius, height, color, width) {
            const group = new THREE.Group();
            const segments = 32;
            const halfHeight = height / 2;
            
            // 上下两个圆
            for (let h of [-halfHeight, halfHeight]) {
                const points = [];
                for (let i = 0; i <= segments; i++) {
                    const angle = (i / segments) * Math.PI * 2;
                    points.push(new THREE.Vector3(
                        center.x + Math.cos(angle) * radius,
                        center.y + h,
                        center.z + Math.sin(angle) * radius
                    ));
                }
                group.add(createLine(points, color, 1.0, width));
            }
            
            // 侧面线
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const x = center.x + Math.cos(angle) * radius;
                const z = center.z + Math.sin(angle) * radius;
                group.add(createLine([
                    new THREE.Vector3(x, center.y - halfHeight, z),
                    new THREE.Vector3(x, center.y + halfHeight, z)
                ], color, 1.0, width));
            }
            
            return group;
        }
        
        // 创建3D圆锥体线框
        function createConeWireframe(center, radius, height, color, width) {
            const group = new THREE.Group();
            const segments = 32;
            const apex = new THREE.Vector3(center.x, center.y + height / 2, center.z);
            const baseY = center.y - height / 2;
            
            // 底面圆
            const basePoints = [];
            for (let i = 0; i <= segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                basePoints.push(new THREE.Vector3(
                    center.x + Math.cos(angle) * radius,
                    baseY,
                    center.z + Math.sin(angle) * radius
                ));
            }
            group.add(createLine(basePoints, color, 1.0, width));
            
            // 从顶点到底面的线
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const basePoint = new THREE.Vector3(
                    center.x + Math.cos(angle) * radius,
                    baseY,
                    center.z + Math.sin(angle) * radius
                );
                group.add(createLine([apex, basePoint], color, 1.0, width));
            }
            
            return group;
        }
        
        // 开始绘制
        function startDraw(event) {
            if (drawMode === 'none') return;
            
            isDrawing = true;
            updateDrawPlane();
            const point = getMousePosition(event);
            
            if (!point) return;
            
            const color = getDrawColor();
            const width = getDrawWidth();
            
            if (drawMode === 'pen') {
                // 画笔模式 - 创建新的线条
                currentLine = {
                    type: 'pen',
                    points: [point.clone()],
                    color: color,
                    width: width,
                    mesh: null
                };
            } else if (drawMode === 'line') {
                // 直线模式 - 记录起点
                drawStartPoint = point.clone();
                
                // 创建临时直线（使用createLine支持可变线宽）
                currentLine = createLine([drawStartPoint, drawStartPoint], color, 1.0, width);
                currentLine.userData = { type: 'line', start: drawStartPoint, end: drawStartPoint, color: color, width: width };
                drawGroup.add(currentLine);
            } else if (drawMode === 'rect') {
                // 矩形模式
                drawStartPoint = point.clone();
                currentLine = createRectLine(drawStartPoint, drawStartPoint, color, width);
                currentLine.userData = { type: 'rect', start: drawStartPoint, color: color, width: width };
                drawGroup.add(currentLine);
            } else if (drawMode === 'ellipse') {
                // 椭圆模式
                drawStartPoint = point.clone();
                currentLine = createEllipseLine(drawStartPoint, 0, 0, color, width);
                currentLine.userData = { type: 'ellipse', start: drawStartPoint, color: color, width: width };
                drawGroup.add(currentLine);
            } else if (drawMode === 'arrow') {
                // 箭头模式
                drawStartPoint = point.clone();
                currentLine = createArrowLine(drawStartPoint, drawStartPoint, color, width);
                currentLine.userData = { type: 'arrow', start: drawStartPoint, color: color, width: width };
                drawGroup.add(currentLine);
            } else if (drawMode === 'text') {
                // 文本模式 - 点击直接输入文本
                isDrawing = false;
                const text = prompt('请输入文本:', '');
                if (text && text.trim()) {
                    const textSprite = createSpriteText(text, color, 20);
                    textSprite.position.copy(point);
                    textSprite.userData.isBillboard = true;
                    drawGroup.add(textSprite);
                    
                    drawnObjects.push({
                        type: 'text',
                        mesh: textSprite,
                        text: text
                    });
                    addToHistory({ type: 'add', object: drawnObjects[drawnObjects.length - 1] });
                }
            } else if (drawMode === 'cube') {
                // 立方体模式
                drawStartPoint = point.clone();
                currentLine = createCubeWireframe(drawStartPoint, 0, color, width);
                currentLine.userData = { type: 'cube', start: drawStartPoint, color: color, width: width };
                drawGroup.add(currentLine);
            } else if (drawMode === 'sphere') {
                // 球体模式
                drawStartPoint = point.clone();
                currentLine = createSphereWireframe(drawStartPoint, 0, color, width);
                currentLine.userData = { type: 'sphere', start: drawStartPoint, color: color, width: width };
                drawGroup.add(currentLine);
            } else if (drawMode === 'cylinder') {
                // 圆柱体模式
                drawStartPoint = point.clone();
                currentLine = createCylinderWireframe(drawStartPoint, 0, 0, color, width);
                currentLine.userData = { type: 'cylinder', start: drawStartPoint, color: color, width: width };
                drawGroup.add(currentLine);
            } else if (drawMode === 'cone') {
                // 圆锥体模式
                drawStartPoint = point.clone();
                currentLine = createConeWireframe(drawStartPoint, 0, 0, color, width);
                currentLine.userData = { type: 'cone', start: drawStartPoint, color: color, width: width };
                drawGroup.add(currentLine);
            } else if (drawMode === 'erase') {
                // 擦除模式
                eraseAtPoint(point);
            }
        }
        
        // 绘制中
        function drawMove(event) {
            if (!isDrawing || drawMode === 'none') return;
            
            const point = getMousePosition(event);
            if (!point) return;
            
            if (drawMode === 'pen' && currentLine) {
                // 添加点到当前线条
                currentLine.points.push(point.clone());
                
                // 更新或创建线条mesh（使用createLine支持可变线宽）
                if (currentLine.mesh) {
                    drawGroup.remove(currentLine.mesh);
                    currentLine.mesh.geometry.dispose();
                    if (currentLine.mesh.material) currentLine.mesh.material.dispose();
                }
                
                currentLine.mesh = createLine(currentLine.points, currentLine.color, 1.0, currentLine.width);
                drawGroup.add(currentLine.mesh);
            } else if (drawMode === 'line' && currentLine && drawStartPoint) {
                // 更新直线终点（重新创建以支持可变线宽）
                const color = currentLine.userData.color;
                const width = currentLine.userData.width;
                
                drawGroup.remove(currentLine);
                currentLine.geometry.dispose();
                if (currentLine.material) currentLine.material.dispose();
                
                currentLine = createLine([drawStartPoint, point], color, 1.0, width);
                currentLine.userData = { type: 'line', start: drawStartPoint, end: point, color: color, width: width };
                drawGroup.add(currentLine);
            } else if (drawMode === 'rect' && currentLine && drawStartPoint) {
                // 更新矩形
                const color = currentLine.userData.color;
                const width = currentLine.userData.width;
                
                drawGroup.remove(currentLine);
                currentLine.geometry.dispose();
                if (currentLine.material) currentLine.material.dispose();
                
                currentLine = createRectLine(drawStartPoint, point, color, width);
                currentLine.userData = { type: 'rect', start: drawStartPoint, end: point, color: color, width: width };
                drawGroup.add(currentLine);
            } else if (drawMode === 'ellipse' && currentLine && drawStartPoint) {
                // 更新椭圆
                const color = currentLine.userData.color;
                const width = currentLine.userData.width;
                const center = new THREE.Vector3().addVectors(drawStartPoint, point).multiplyScalar(0.5);
                const rx = Math.abs(point.x - drawStartPoint.x) / 2;
                const ry = Math.abs(point.y - drawStartPoint.y) / 2;
                
                drawGroup.remove(currentLine);
                currentLine.geometry.dispose();
                if (currentLine.material) currentLine.material.dispose();
                
                currentLine = createEllipseLine(center, rx, ry, color, width);
                currentLine.userData = { type: 'ellipse', start: drawStartPoint, end: point, color: color, width: width };
                drawGroup.add(currentLine);
            } else if (drawMode === 'arrow' && currentLine && drawStartPoint) {
                // 更新箭头
                const color = currentLine.userData.color;
                const width = currentLine.userData.width;
                
                drawGroup.remove(currentLine);
                // 清理group中的子对象
                currentLine.children.forEach(child => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) child.material.dispose();
                });
                
                currentLine = createArrowLine(drawStartPoint, point, color, width);
                currentLine.userData = { type: 'arrow', start: drawStartPoint, end: point, color: color, width: width };
                drawGroup.add(currentLine);
            } else if ((drawMode === 'cube' || drawMode === 'sphere' || drawMode === 'cylinder' || drawMode === 'cone') && currentLine && drawStartPoint) {
                // 更新3D图形
                const color = currentLine.userData.color;
                const width = currentLine.userData.width;
                const dx = Math.abs(point.x - drawStartPoint.x);
                const dy = Math.abs(point.y - drawStartPoint.y);
                const size = Math.max(dx, dy);
                
                drawGroup.remove(currentLine);
                currentLine.children.forEach(child => {
                    if (child.geometry) child.geometry.dispose();
                    if (child.material) child.material.dispose();
                });
                
                const center = new THREE.Vector3().addVectors(drawStartPoint, point).multiplyScalar(0.5);
                
                if (drawMode === 'cube') {
                    currentLine = createCubeWireframe(center, size, color, width);
                } else if (drawMode === 'sphere') {
                    currentLine = createSphereWireframe(center, size / 2, color, width);
                } else if (drawMode === 'cylinder') {
                    currentLine = createCylinderWireframe(center, size / 2, size, color, width);
                } else if (drawMode === 'cone') {
                    currentLine = createConeWireframe(center, size / 2, size, color, width);
                }
                
                currentLine.userData = { type: drawMode, start: drawStartPoint, end: point, color: color, width: width };
                drawGroup.add(currentLine);
            }
        }
        
        // 结束绘制
        function endDraw() {
            if (!isDrawing) return;
            
            isDrawing = false;
            
            if (drawMode === 'pen' && currentLine && currentLine.mesh) {
                // 保存画笔线条到历史
                drawnObjects.push({
                    type: 'pen',
                    mesh: currentLine.mesh,
                    points: currentLine.points
                });
                addToHistory({ type: 'add', object: drawnObjects[drawnObjects.length - 1] });
                currentLine = null;
            } else if ((drawMode === 'line' || drawMode === 'rect' || drawMode === 'ellipse' || drawMode === 'arrow' || drawMode === 'cube' || drawMode === 'sphere' || drawMode === 'cylinder' || drawMode === 'cone') && currentLine) {
                // 保存图形到历史
                drawnObjects.push({
                    type: drawMode,
                    mesh: currentLine,
                    start: drawStartPoint,
                    end: currentLine.userData.end || currentLine.userData.start
                });
                addToHistory({ type: 'add', object: drawnObjects[drawnObjects.length - 1] });
                currentLine = null;
                drawStartPoint = null;
            }
        }
        
        // 擦除功能
        function eraseAtPoint(point) {
            const eraseRadius = 10; // 擦除半径
            
            for (let i = drawnObjects.length - 1; i >= 0; i--) {
                const obj = drawnObjects[i];
                let shouldErase = false;
                
                if (obj.type === 'pen') {
                    // 检查线条上的点是否在擦除范围内
                    for (let p of obj.points) {
                        if (p.distanceTo(point) < eraseRadius) {
                            shouldErase = true;
                            break;
                        }
                    }
                } else if (obj.type === 'line') {
                    // 检查直线是否在擦除范围内
                    if (obj.start.distanceTo(point) < eraseRadius || 
                        obj.end.distanceTo(point) < eraseRadius) {
                        shouldErase = true;
                    }
                }
                
                if (shouldErase) {
                    // 从场景中移除
                    drawGroup.remove(obj.mesh);
                    if (obj.mesh.geometry) obj.mesh.geometry.dispose();
                    if (obj.mesh.material) obj.mesh.material.dispose();
                    
                    // 添加到历史记录（用于撤销）
                    addToHistory({ type: 'erase', object: obj, index: i });
                    
                    // 从数组中移除
                    drawnObjects.splice(i, 1);
                }
            }
        }
        
        // 添加到历史记录
        function addToHistory(action) {
            drawHistory.push(action);
            // 限制历史记录数量
            if (drawHistory.length > 50) {
                drawHistory.shift();
            }
        }
        
        // 撤销功能
        function undo() {
            if (drawHistory.length === 0) return;
            
            const action = drawHistory.pop();
            
            if (action.type === 'add') {
                // 撤销添加 - 移除对象
                const obj = action.object;
                drawGroup.remove(obj.mesh);
                if (obj.mesh.geometry) obj.mesh.geometry.dispose();
                if (obj.mesh.material) obj.mesh.material.dispose();
                
                const index = drawnObjects.indexOf(obj);
                if (index > -1) drawnObjects.splice(index, 1);
            } else if (action.type === 'erase') {
                // 撤销擦除 - 恢复对象
                const obj = action.object;
                drawGroup.add(obj.mesh);
                drawnObjects.splice(action.index, 0, obj);
            }
        }
        
        // 清空所有绘制
        function clearDrawings() {
            // 保存当前状态到历史（用于撤销清空）
            if (drawnObjects.length > 0) {
                addToHistory({ type: 'clear', objects: [...drawnObjects] });
            }
            
            // 移除所有绘制对象
            for (let obj of drawnObjects) {
                drawGroup.remove(obj.mesh);
                if (obj.mesh.geometry) obj.mesh.geometry.dispose();
                if (obj.mesh.material) obj.mesh.material.dispose();
            }
            drawnObjects = [];
        }
        
        // 设置绘制模式
        function setDrawMode(mode) {
            drawMode = mode;
            
            switch(mode) {
                case 'none':
                    renderer.domElement.style.cursor = 'default';
                    controls.enabled = true;
                    break;
                case 'pen':
                    renderer.domElement.style.cursor = 'crosshair';
                    controls.enabled = false;
                    break;
                case 'line':
                    renderer.domElement.style.cursor = 'crosshair';
                    controls.enabled = false;
                    break;
                case 'text':
                    renderer.domElement.style.cursor = 'text';
                    controls.enabled = false;
                    break;
                case 'rect':
                    renderer.domElement.style.cursor = 'crosshair';
                    controls.enabled = false;
                    break;
                case 'ellipse':
                    renderer.domElement.style.cursor = 'crosshair';
                    controls.enabled = false;
                    break;
                case 'arrow':
                    renderer.domElement.style.cursor = 'crosshair';
                    controls.enabled = false;
                    break;
                case 'cube':
                case 'sphere':
                case 'cylinder':
                case 'cone':
                    renderer.domElement.style.cursor = 'crosshair';
                    controls.enabled = false;
                    break;
                case 'erase':
                    renderer.domElement.style.cursor = 'not-allowed';
                    controls.enabled = false;
                    break;
            }
        }

        function bindEvents() {
            // 纬度、经度变化时重新计算，并限制为3位小数
            ['input-lat', 'input-lon'].forEach(id => {
                const input = document.getElementById(id);
                input.addEventListener('change', function() {
                    const value = parseFloat(this.value);
                    if (!isNaN(value)) {
                        this.value = value.toFixed(3);
                    }
                    updateAstronomicalData();
                });
            });
            
            // 时间输入变化时：将输入的时间（基于当前时间体系）转换为UTC存储，然后重新计算
            document.getElementById('input-time').addEventListener('change', function(e) {
                const lon = parseFloat(document.getElementById('input-lon').value) || 0;
                const timeSystem = document.getElementById('time-system').value;
                internalUTCDate = timeSystemToUTC(e.target.value, timeSystem, lon);
                updateAstronomicalData();
            });
            
            // 时间体系变化时：保持内部UTC时间不变，更新输入框显示，然后重新计算
            document.getElementById('time-system').addEventListener('change', function() {
                updateTimeInputDisplay();
                updateAstronomicalData();
            });

            // 绑定显示开关
            const toggles = {
                'toggle-sun-traj': groups.sunTraj,
                'toggle-sun-hour': groups.sunHour,
                'toggle-moon-traj': groups.moonTraj,
                'toggle-moon-hour': groups.moonHour,
                'toggle-horizon': groups.horizon,
                'toggle-equatorial': groups.equatorialGrid,
                'toggle-equator': groups.equatorLine,
                'toggle-gnomon': groups.gnomon
            };

            for (let id in toggles) {
                document.getElementById(id).addEventListener('change', function(e) {
                    toggles[id].visible = e.target.checked;
                });
            }

            // 绑定线宽输入框事件
            const lineWidthInputs = ['line-width-grid', 'line-width-sun', 'line-width-moon'];
            lineWidthInputs.forEach(id => {
                const input = document.getElementById(id);
                input.addEventListener('change', updateAstronomicalData);
            });

            // 绑定动画控制按钮
            document.getElementById('anim-play').addEventListener('click', startAnimation);
            document.getElementById('anim-pause').addEventListener('click', pauseAnimation);
            document.getElementById('anim-reset').addEventListener('click', resetAnimation);

            // 绑定左侧工具栏按钮
            const toolButtons = {
                'tool-select': 'none',
                'tool-pen': 'pen',
                'tool-line': 'line',
                'tool-text': 'text',
                'tool-rect': 'rect',
                'tool-ellipse': 'ellipse',
                'tool-arrow': 'arrow',
                'tool-cube': 'cube',
                'tool-sphere': 'sphere',
                'tool-cylinder': 'cylinder',
                'tool-cone': 'cone',
                'tool-erase': 'erase'
            };
            
            for (let [id, mode] of Object.entries(toolButtons)) {
                document.getElementById(id).addEventListener('click', function() {
                    // 更新按钮状态
                    document.querySelectorAll('.draw-tool-btn').forEach(btn => btn.classList.remove('active'));
                    this.classList.add('active');
                    setDrawMode(mode);
                });
            }
            
            document.getElementById('tool-undo').addEventListener('click', undo);
            document.getElementById('tool-clear').addEventListener('click', clearDrawings);

            // 绑定绘图鼠标事件
            const canvas = renderer.domElement;
            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', drawMove);
            canvas.addEventListener('mouseup', endDraw);
            canvas.addEventListener('mouseleave', endDraw);
            
            // 键盘快捷键
            window.addEventListener('keydown', function(e) {
                if (e.target.tagName === 'INPUT') return;
                switch(e.key.toLowerCase()) {
                    case 'v': document.getElementById('tool-select').click(); break;
                    case 'p': document.getElementById('tool-pen').click(); break;
                    case 'l': document.getElementById('tool-line').click(); break;
                    case 't': document.getElementById('tool-text').click(); break;
                    case 'r': document.getElementById('tool-rect').click(); break;
                    case 'c': document.getElementById('tool-cube').click(); break;
                    case 's': document.getElementById('tool-sphere').click(); break;
                    case 'y': document.getElementById('tool-cylinder').click(); break;
                    case 'n': document.getElementById('tool-cone').click(); break;
                    case 'e': 
                        if (e.ctrlKey) {
                            document.getElementById('tool-erase').click();
                        }
                        break;
                    case 'z':
                        if (e.ctrlKey) undo();
                        break;
                    case 'delete':
                    case 'backspace':
                        clearDrawings();
                        break;
                }
            });

            // 窗口缩放自适应
            window.addEventListener('resize', onWindowResize, false);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            
            // 让billboard对象始终面向相机
            scene.traverse(function(object) {
                if (object.userData.isBillboard) {
                    object.lookAt(camera.position);
                }
            });
            
            renderer.render(scene, camera);
        }

        // 动画更新函数
        function updateAnimation(timestamp) {
            if (!animationState.isPlaying) return;
            
            // 控制帧率
            if (timestamp - animationState.lastFrameTime < animationState.frameInterval) {
                animationId = requestAnimationFrame(updateAnimation);
                return;
            }
            animationState.lastFrameTime = timestamp;
            
            // 获取动画速度
            const speed = parseInt(document.getElementById('anim-speed').value) || 10;
            
            // 更新时间（增加指定分钟数）
            internalUTCDate = new Date(internalUTCDate.getTime() + speed * 60000);
            
            // 更新输入框显示
            updateTimeInputDisplay();
            
            // 重新计算天文数据
            updateAstronomicalData();
            
            // 继续动画
            animationId = requestAnimationFrame(updateAnimation);
        }

        // 开始动画
        function startAnimation() {
            if (animationState.isPlaying) return;
            animationState.isPlaying = true;
            animationState.lastFrameTime = performance.now();
            animationId = requestAnimationFrame(updateAnimation);
        }

        // 暂停动画
        function pauseAnimation() {
            animationState.isPlaying = false;
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }

        // 重置动画
        function resetAnimation() {
            pauseAnimation();
            internalUTCDate = new Date();
            updateTimeInputDisplay();
            updateAstronomicalData();
        }

        // 启动程序
        window.onload = init;
    </script>
</body>
</html>
